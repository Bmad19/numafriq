services:
  - type: web
    name: numafriq-api
    runtime: node
    buildCommand: npm install --omit=dev
    startCommand: node scripts/bureau-api.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: WA_PHONE
        value: "22656191930"
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_PHONE_ID
        sync: false
