# Blueprint Render — API Node Afrilex Conseil (Supabase)
# Render → New → Blueprint → dépôt Git dont la racine = dossier afrilex
# Renseigner SUPABASE_*, GROQ_API_KEY dans Environment après création.

services:
  - type: web
    name: afrilex-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/bureau/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
