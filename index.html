<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── Cache-busting HTML (toujours revalider) ────────────────────────── -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- ─── SEO ──────────────────────────────────────────────────────────── -->
    <title>NUMAFRIQ | Agence web africaine moderne</title>
    <meta name="description" content="NUMAFRIQ est une agence web africaine moderne spécialisée en création de sites web, SEO, branding et stratégies digitales orientées résultats." />
    <meta name="theme-color" content="#0a0a0c" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ─── Open Graph ───────────────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="NUMAFRIQ" />
    <meta property="og:title"       content="NUMAFRIQ | Agence web africaine moderne" />
    <meta property="og:description" content="Création de sites web, SEO, branding et accompagnement digital pour les entreprises africaines et la diaspora." />

    <!-- ─── Twitter Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="NUMAFRIQ | Agence web africaine moderne" />
    <meta name="twitter:description" content="Création de sites web, SEO, branding et accompagnement digital pour les entreprises africaines et la diaspora." />

    <!-- ─── Preconnect images externes ──────────────────────────────────── -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- ─── Google Fonts (non-bloquant) ─────────────────────────────────── -->
    <!--
      display=swap évite le FOIT (flash of invisible text).
      preconnect DNS dès le chargement du HTML.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com"    crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Syne:wght@400;500;600;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <!-- Fallback si JS désactivé -->
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Syne:wght@400;500;600;700;800&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
