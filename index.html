<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── Cache-busting HTML (toujours revalider) ────────────────────────── -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- ─── SEO ──────────────────────────────────────────────────────────── -->
    <title>Afrilex Conseil | Cabinet juridique, fiscal et comptable</title>
    <meta name="description" content="Afrilex Conseil — Cabinet d'assistance juridique, fiscale et comptable à Ouagadougou, Burkina Faso. Zones d'intervention : Afrique de l'Ouest, autres pays OHADA, diaspora. Tél. +226 52 20 91 91." />
    <meta name="theme-color" content="#263a34" />
    <!-- Favicon = même fichier que le logo ; href complété au boot si BASE_URL ≠ racine (voir main.tsx). -->
    <link rel="icon" type="image/png" href="/afrilex-logo.png" />
    <link rel="apple-touch-icon" href="/afrilex-logo.png" />

    <!-- ─── Open Graph ───────────────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Afrilex Conseil" />
    <meta property="og:title"       content="Afrilex Conseil | Cabinet juridique, fiscal et comptable" />
    <meta property="og:description" content="Assistance juridique, fiscale et comptable. Ouagadougou, Burkina Faso — Afrique de l'Ouest, autres pays OHADA, diaspora." />

    <!-- ─── Twitter Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Afrilex Conseil | Cabinet juridique, fiscal et comptable" />
    <meta name="twitter:description" content="Assistance juridique, fiscale et comptable — Ouagadougou. Zones : Afrique de l'Ouest, autres pays OHADA, diaspora." />

    <!-- ─── Preconnect images externes ──────────────────────────────────── -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- ─── Google Fonts (non-bloquant) ─────────────────────────────────── -->
    <!--
      display=swap évite le FOIT (flash of invisible text).
      preconnect DNS dès le chargement du HTML.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com"    crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Syne:wght@400;500;600;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <!-- Fallback si JS désactivé -->
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Syne:wght@400;500;600;700;800&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
